name: Regenerate Ticker Catalog

on:
  workflow_dispatch:  # 수동 실행 전용 (메타데이터는 자주 변하지 않음)
  schedule:
    - cron: '0 2 * * 0'  # 매주 일요일 02:00 UTC

jobs:
  regenerate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ticker generator
        run: python tools/generate_tickers.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/tickers.json
          if git diff --staged --quiet; then
            echo "No catalog changes to commit."
          else
            git commit -m "chore: regenerate ticker catalog [$(date -u +'%Y-%m-%d')]"
            git push
            echo "✓ Catalog regenerated and pushed."
          fi
