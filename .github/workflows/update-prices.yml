name: Update SPHERE Prices

on:
  schedule:
    # 매일 23:00 UTC = 08:00 KST (KOSPI 마감 후, 다음 세션 전)
    - cron: '0 23 * * *'
  workflow_dispatch:  # 수동 실행 허용

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Run price updater
        run: python tools/update_prices.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/prices.json
          if git diff --staged --quiet; then
            echo "No price changes to commit."
          else
            git commit -m "chore: update daily prices [$(date -u +'%Y-%m-%d')]"
            git push
            echo "✓ Prices updated and pushed."
          fi
